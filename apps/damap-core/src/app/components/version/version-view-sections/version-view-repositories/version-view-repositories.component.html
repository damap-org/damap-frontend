@for (repo of repositories(); track repo.repositoryId; let last = $last) {
  <div>
    <h3>{{ repo.title }}</h3>
    <div>
      <span class="headings">{{ 'dmp.versions.view.repositories.datasets' | translate }}:</span>
      <ul>
        @for (dataset of getDatasetsForRepository(repo); track dataset.id) {
          <li>
            {{ dataset.title }}
          </li>
        }
      </ul>
    </div>
    @if (!last) {
      <hr />
    }
  </div>
}

<div
  class="background"
  [style.background-image]="backgroundUrl ? 'url(' + backgroundUrl + ')' : ''">
  <div class="container">
    <div class="logo-info-bar fadeInTop">
      <img class="logo" [src]="logoUrl" alt="Logo" />
      <!--
      For now commented out, until we have some info we can display here
      -->
      <div class="info-bar">
        <!-- <div class="info-bar-typography">
        Usage 29 | DMPs 311 | Related Organizations 322
      </div> -->
      </div>
    </div>
    <div class="double-items">
      <div class="left-side-container">
        <div class="title-typography fadeInTop">
          {{ "landing.title" | translate }}
        </div>
        <div class="double-items fadeInLeft">
          @if ((backendDown$ | async) === false) {
            <button
              mat-flat-button
              class="pulse-button button-color-primary"
              routerLink="/dashboard">
              <mat-icon>play_arrow</mat-icon>
              <span>{{ "landing.start" | translate }}</span>
            </button>
          }

          <a
            mat-button
            class="empty-button-with-border play-video-btn"
            href="https://www.youtube.com/watch?v=IxQzqy26ZO4"
            target="_blank"
            rel="noopener noreferrer">
            <mat-icon class="material-icon-primary"
              >cast_for_education</mat-icon
            >
            <span>Introduction</span>
          </a>
        </div>
      </div>
      <div class="landing-page-graphic-container fadeInTop">
        <img class="landing-page-graphic" [src]="graphicUrl" alt="Thumb" />
      </div>
    </div>
  </div>
</div>

name: test

permissions:
  contents: read

on:
  push:
    branches:
      - master
      - next
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    name: continuous-integration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm run ci:install

      - name: Check formatting
        run: npm run ci:format

      - name: Lint and typecheck
        run: npm run ci:lint

      - name: Build
        run: npm run ci:build

      - name: Run spec tests
        run: npm run ci:test:spec

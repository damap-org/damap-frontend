<h1 mat-dialog-title>{{'export-dialog.title' | translate}}</h1>
<mat-dialog-content>
  {{'export-dialog.message' | translate}}
  <div class="container">
    <ng-container>
      <mat-form-field *ngIf="!funderSupported">
        <mat-label>{{ 'export-dialog.field.type' | translate }}</mat-label>
        <mat-select [(value)]="selectedTemplate">
          <mat-option
            *ngFor="let template of activeTemplates()"
            [value]="template.id">
            {{ template.name }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </ng-container>
    <div class="button-group">
      <button
        class="button"
        [mat-dialog-close]="selectedTemplate"
        [disabled]="!selectedTemplate && !funderSupported"
        mat-flat-button>
        {{'export-dialog.button.ok' | translate}}
      </button>
      <button class="button" mat-dialog-close="cancel" mat-flat-button>
        {{'export-dialog.button.cancel' | translate}}
      </button>
    </div>
  </div>
</mat-dialog-content>

<div class="button-row">
  <section class="button-section">
    @if (selectedView === "primaryView") {
      <button mat-flat-button (click)="emitSelection('primaryView')">
        {{ primaryLabel() | translate }}
      </button>
      <button
        mat-button
        class="empty-button-with-border"
        (click)="emitSelection('secondaryView')">
        {{ secondaryLabel() | translate }}
      </button>
    } @else {
      <button
        mat-button
        class="empty-button-with-border"
        (click)="emitSelection('primaryView')">
        {{ primaryLabel() | translate }}
      </button>
      <button mat-flat-button (click)="emitSelection('secondaryView')">
        {{ secondaryLabel() | translate }}
      </button>
    }
  </section>
</div>

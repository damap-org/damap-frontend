<div class="dropzone" appDragdrop (fileDropped)="onFileDropped($event)">
  <input
    type="file"
    #fileDrop
    id="fileDrop"
    multiple
    (change)="onFileSelected($event)"
    hidden />
  <mat-icon>upload_file</mat-icon>
  <span>{{
    "dmp.steps.data.specify.file-upload.dropzone.hint" | translate
  }}</span>
</div>

<div class="file-input">
  <button
    mat-flat-button
    class="upload-btn button-position"
    (click)="fileDrop.click()">
    <span>{{
      "dmp.steps.data.specify.file-upload.button.choose" | translate
    }}</span>
    <mat-icon>attach_file</mat-icon>
  </button>
</div>

<!-- FILES -->
<div>
  @for (
    upload of fileUpload();
    track upload.file.name + upload.file.size + upload.file.lastModified;
    let i = $index
  ) {
    @if (!upload.finalized) {
      <div class="progress">
        <div class="progress-row">
          {{ upload.file.name }}
          <button
            mat-icon-button
            class="cancel-upload"
            (click)="cancelUpload(i)">
            <mat-icon>clear</mat-icon>
          </button>
        </div>
        <mat-progress-bar
          class="progress-bar"
          mode="determinate"
          [value]="upload.progress" />
      </div>
    }
  }
</div>

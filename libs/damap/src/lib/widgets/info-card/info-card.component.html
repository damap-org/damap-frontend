<mat-card
  appearance="outlined"
  *ngIf="isIntroShow"
  [ngClass]="{
    'info-box': true,
    'mat-icon-shadow': true,
    'custom-card': true,
    collapsed: isCollapsed,
  }"
  (click)="isCollapsed ? toggleCollapse() : null">
  <div class="card-controls">
    <button (click)="closeIntro()" mat-icon-button class="close-button">
      <mat-icon class="material-icon-primary close-icon" matSuffix>
        close
      </mat-icon>
    </button>
  </div>
  <mat-card-content class="mat-content">
    <div class="flex-row-container">
      <section>
        <div
          [ngClass]="{
            'info-icon-background': icon === 'info',
            'number-icon-background': icon > 0,
          }">
          <mat-icon
            class="page-info-icon"
            [ngClass]="{
              'material-icon-primary outline': icon === 'info',
              'material-icon-white-background-primary number-icon': icon > 0,
            }">
            {{ icon }}
          </mat-icon>
        </div>
      </section>
      <div class="info-box-container mat-title-medium">
        {{ instructions | translate }}
      </div>
    </div>
    <button
      (click)="toggleCollapse()"
      mat-button
      *ngIf="isCollapsed"
      class="expand-collapse-btn">
      <mat-icon class="material-icon-primary">keyboard_arrow_down</mat-icon>
      <span>Show details</span>
    </button>
  </mat-card-content>
</mat-card>

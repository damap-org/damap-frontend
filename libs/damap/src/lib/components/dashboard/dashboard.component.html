<app-info-card />
<div [class]="isSmallScreen ? 'flex-grid-small' : 'flex-grid-large'">
  <div class="flex-grid-item">
    <mat-card appearance="outlined" class="dashboard-card mat-icon-shadow">
      <mat-card-content>
        <div class="flip-card-container">
          <app-flip-card
            [navigateRoute]="'/plans'"
            iconCard="list_alt"
            frontContent="{{
              'dashboard.cards.my-dmps.front-side' | translate
            }}"
            backContent="{{
              'dashboard.cards.my-dmps.back-side' | translate
            }}" />

          <app-flip-card
            [navigateRoute]="'/dmp'"
            iconCard="add_circle"
            frontContent="{{
              'dashboard.cards.create-new-dmp.front-side' | translate
            }}"
            backContent="{{
              'dashboard.cards.create-new-dmp.back-side' | translate
            }}" />
        </div>
      </mat-card-content>
    </mat-card>
  </div>
  <div class="flex-grid-item">
    <mat-card appearance="outlined" class="dashboard-card mat-icon-shadow">
      <mat-card-content>
        <div class="flip-card-container">
          <app-flip-card
            [navigateRoute]="'info/how-to-create'"
            frontContent="{{
              'dashboard.cards.how-to-create.front-side' | translate
            }}"
            iconCard="contact_support"
            backContent="{{
              'dashboard.cards.how-to-create.back-side' | translate
            }}" />

          <app-flip-card
            [navigateRoute]="'info/damap'"
            iconCard="info"
            frontContent="{{ 'info.how-to-create.tool.heading' | translate }}"
            backContent="{{
              'dashboard.cards.about-damap.back-side' | translate
            }}" />
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>

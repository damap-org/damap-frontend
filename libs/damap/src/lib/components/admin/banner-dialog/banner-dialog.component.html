<h1 mat-dialog-title>
  <ng-container *ngIf="mode === 'edit'; else add">{{
    "admin.banner.dialog.title.edit" | translate
  }}</ng-container>
  <ng-template #add>{{
    "admin.banner.dialog.title.create" | translate
  }}</ng-template>
</h1>

<mat-dialog-content id="datasetDialog">
  <div [formGroup]="banner">
    <app-input-wrapper
      [label]="'admin.banner.dialog.field.title' | translate"
      [control]="title"></app-input-wrapper>
    <app-input-wrapper
      [label]="'admin.banner.dialog.field.description' | translate"
      [control]="description"></app-input-wrapper>
    <div class="color-picker-wrapper">
      <input
        id="backgroundColor"
        type="color"
        [formControl]="color"
        class="color-picker-input"
        [matTooltip]="'admin.banner.dialog.help.backgroundColor' | translate"
        matTooltipPosition="above" />
      <label for="backgroundColor" class="color-picker-label">
        {{ "admin.banner.dialog.field.backgroundColor" | translate }}
      </label>
    </div>
    <mat-checkbox formControlName="dismissible">
      {{ "admin.banner.dialog.field.dismissible" | translate }}
    </mat-checkbox>
  </div>
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-button (click)="onNoClick()">
    {{ "admin.banner.dialog.button.cancel" | translate }}
  </button>
  <button (click)="onDialogClose()" mat-raised-button [disabled]="isDisabled()">
    <ng-container *ngIf="mode === 'edit'">{{
      "admin.banner.dialog.button.update" | translate
    }}</ng-container>
    <ng-container *ngIf="mode === 'add'">{{
      "admin.banner.dialog.button.add" | translate
    }}</ng-container>
  </button>
</mat-dialog-actions>

<h1 mat-dialog-title>
  <ng-container *ngIf="mode === 'edit'; else add">{{
    "admin.internalStorage.translation.dialog.title.edit" | translate
  }}</ng-container>
  <ng-template #add>{{
    "admin.internalStorage.translation.dialog.title.create" | translate
  }}</ng-template>
</h1>

<mat-dialog-content id="datasetDialog">
  <div [formGroup]="storageTranslation">
    <hr />

    <app-language-code-input
      class="dialogRow"
      [label]="
        'admin.internalStorage.translation.dialog.field.languageCode'
          | translate
      "
      [hint]="
        'admin.internalStorage.translation.dialog.field.languageCodeHint'
          | translate
      "
      [control]="languageCode"
      [errorMessageRequired]="
        'admin.internalStorage.translation.dialog.field.languageCodeRequired'
          | translate
      "
      [errorMessageInvalid]="
        'admin.internalStorage.translation.dialog.field.languageCodeInvalid'
          | translate
      ">
    </app-language-code-input>

    <app-input-wrapper
      [label]="
        'admin.internalStorage.translation.dialog.field.title' | translate
      "
      [control]="title"></app-input-wrapper>

    <app-textarea-wrapper
      [label]="
        'admin.internalStorage.translation.dialog.field.description' | translate
      "
      [control]="description"
      [maxLength]="4000"></app-textarea-wrapper>

    <app-input-wrapper
      [label]="
        'admin.internalStorage.translation.dialog.field.backupFrequency'
          | translate
      "
      [control]="backupFrequency"></app-input-wrapper>
  </div>
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-button (click)="onNoClick()">
    {{ "admin.internalStorage.translation.dialog.button.cancel" | translate }}
  </button>
  <button
    (click)="onDialogClose()"
    mat-flat-button
    [disabled]="storageTranslation.invalid">
    <ng-container *ngIf="mode === 'edit'">{{
      "admin.internalStorage.translation.dialog.button.update" | translate
    }}</ng-container>
    <ng-container *ngIf="mode === 'add'">{{
      "admin.internalStorage.translation.dialog.button.add" | translate
    }}</ng-container>
  </button>
</mat-dialog-actions>

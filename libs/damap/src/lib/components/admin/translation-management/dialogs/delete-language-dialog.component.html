<h1 mat-dialog-title>
  {{ "admin.appTranslations.removeLanguage" | translate }}
</h1>
<mat-dialog-content class="dialog-content">
  <p class="warning">
    {{ "admin.appTranslations.removeLanguageWarning" | translate }}
  </p>
  <p class="language">
    {{ data.language | uppercase }}
  </p>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button (click)="cancel()">
    {{ "admin.appTranslations.cancel" | translate }}
  </button>
  <button mat-raised-button color="warn" (click)="confirm()">
    {{ "admin.appTranslations.removeLanguage" | translate }}
  </button>
</mat-dialog-actions>

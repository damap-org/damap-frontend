<mat-accordion class="mobile-accordion">
  <mat-expansion-panel class="mobile-panel">
    <mat-expansion-panel-header>
      <mat-panel-title>
        {{ "actions-bar.mobile.title" | translate }}
      </mat-panel-title>
    </mat-expansion-panel-header>
    <div id="save-dmp">
      <button
        class="action-button"
        mat-button
        [routerLink]="'/plans'"
        [disabled]="!formChanged"
        routerLinkActive="active">
        {{ "actions-bar.buttons.discard" | translate }}
      </button>
      <button
        class="action-button"
        mat-flat-button
        (click)="saveDmp()"
        [disabled]="dmpForm.invalid || !this.formChanged || this.savingDmp">
        {{ "actions-bar.buttons.save" | translate }}
      </button>
      <button
        class="action-button"
        mat-flat-button
        (click)="saveDmpVersion()"
        [disabled]="dmpForm.invalid || this.savingDmp">
        {{ "actions-bar.buttons.version" | translate }}
      </button>
      <button
        class="action-button"
        mat-flat-button
        (click)="exportDmpTemplate()"
        [disabled]="dmpForm.invalid || this.savingDmp">
        {{ "actions-bar.buttons.export" | translate }}
      </button>
    </div>
  </mat-expansion-panel>
</mat-accordion>

<div class="actions-bar desktop-actions">
  <app-save-status [saved]="!formChanged"></app-save-status>
  <div id="save-dmp">
    <button
      class="action-button"
      mat-button
      [routerLink]="'/plans'"
      [disabled]="!this.formChanged"
      routerLinkActive="active">
      {{ "actions-bar.buttons.discard" | translate }}
    </button>
    <button
      class="action-button"
      mat-flat-button
      (click)="saveDmp()"
      [disabled]="dmpForm.invalid || !this.formChanged || this.savingDmp">
      {{ "actions-bar.buttons.save" | translate }}
    </button>
    <button
      class="action-button"
      mat-flat-button
      (click)="saveDmpVersion()"
      [disabled]="dmpForm.invalid || this.savingDmp">
      {{ "actions-bar.buttons.version" | translate }}
    </button>
    @if (preview) {
      <div
        matTooltip="{{
          'actions-bar.buttons.preview.hintWhenDisabled' | translate
        }}"
        [matTooltipDisabled]="previewEnabled()">
        <button
          class="action-button"
          mat-flat-button
          [disabled]="!previewEnabled()"
          (click)="showPreview()">
          {{ "actions-bar.buttons.preview.label" | translate }}
        </button>
      </div>
    }
    <button
      class="action-button"
      mat-flat-button
      (click)="exportDmpTemplate()"
      [disabled]="dmpForm.invalid || this.savingDmp">
      {{ "actions-bar.buttons.export" | translate }}
    </button>
  </div>
</div>

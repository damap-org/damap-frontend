<mat-label class="label-title mat-title-large" id="example-radio-group-label">{{
  "dmp.steps.data.reuse.sectionTitle" | translate
}}</mat-label>
<mat-card class="data-reuse-card card-shadow">
  <mat-card-content>
    <div [formGroup]="reuseStep">
      <app-textarea-wrapper
        [label]="'dmp.steps.data.reuse.question.short.targetAudience'"
        [longLabel]="'dmp.steps.data.reuse.question.long.targetAudience'"
        [control]="targetAudience"
        [autocompleteOptions]="optionsTargetAudience">
      </app-textarea-wrapper>

      <app-textarea-wrapper
        [label]="'dmp.steps.data.reuse.question.short.tools'"
        [longLabel]="'dmp.steps.data.reuse.question.long.tools'"
        [control]="tools"
        [maxLength]="4000">
      </app-textarea-wrapper>

      <ng-container *ngIf="restricted?.length > 0">
        <app-textarea-wrapper
          [label]="'dmp.steps.data.reuse.question.short.restrictedDataAccess'"
          [longLabel]="'dmp.steps.data.reuse.question.long.restrictedDataAccess'"
          [labelDatasets]="restricted"
          [control]="restrictedDataAccess"
          [maxLength]="4000">
        </app-textarea-wrapper>
      </ng-container>
    </div>
  </mat-card-content>
</mat-card>

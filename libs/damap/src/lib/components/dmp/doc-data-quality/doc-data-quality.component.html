<div *ngIf="docDataStep?.value">
  <mat-label
    class="label-title mat-title-large"
    id="example-radio-group-label"
    >{{ "dmp.steps.documentation.label" | translate }}</mat-label
  >
  <mat-card
    appearance="raised"
    class="card-selected responsive-card card-shadow">
    <mat-card-content>
      <div class="mat-card-container">
        <app-textarea-wrapper
          [label]="'dmp.steps.documentation.question.short.structure'"
          [longLabel]="'dmp.steps.documentation.question.long.structure'"
          [control]="structure"
          [autocompleteOptions]="optionsStructureAndVersioning">
        </app-textarea-wrapper>

        <div class="form-field-hint">
          <app-textarea-wrapper
            [label]="'dmp.steps.documentation.question.short.metadata'"
            [longLabel]="'dmp.steps.documentation.question.long.metadata'"
            [control]="metadata"
            [autocompleteOptions]="optionsMetadata">
          </app-textarea-wrapper>
          <app-tooltip [tooltip]="'info.documentation.metadata'"></app-tooltip>
        </div>

        <app-textarea-wrapper
          [label]="'dmp.steps.documentation.question.short.documentation'"
          [longLabel]="'dmp.steps.documentation.question.long.documentation'"
          [control]="documentation">
        </app-textarea-wrapper>

        <div class="data-quality-question">
          <mat-hint>{{
            "dmp.steps.documentation.question.long.dataQuality" | translate
          }}</mat-hint>
          <mat-form-field class="full-width" [formGroup]="docDataStep">
            <mat-label
              >{{
                "dmp.steps.documentation.question.short.dataQuality" | translate
              }}
            </mat-label>
            <mat-select formControlName="dataQuality" multiple #matSelect>
              <mat-option
                *ngFor="
                  let option of dataQualityOptions | keyvalue: originalOrder
                "
                [value]="option.key">
                {{ translateDataQualityPrefixEnum + option.value | translate }}
              </mat-option>
            </mat-select>
          </mat-form-field>
        </div>
        <app-textarea-wrapper
          *ngIf="isOtherDataQualitySelected"
          [maxLength]="4000"
          [label]="'dmp.steps.documentation.question.short.otherDataQuality'"
          [longLabel]="'dmp.steps.documentation.question.long.otherDataQuality'"
          [control]="otherDataQuality"></app-textarea-wrapper>
      </div>
    </mat-card-content>
  </mat-card>
</div>
